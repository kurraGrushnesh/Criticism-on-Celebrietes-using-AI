name: celeb_sentiment_tracker
description: "Celeb-Sentiment-Tracker — AI celebrity intelligence platform with sentiment analysis."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2

  # HTTP & Networking
  http: ^1.3.0

  # Charts
  fl_chart: ^0.70.2

  # UI & Animation
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.3.1

  # Local Storage
  hive_flutter: ^1.1.0

  # WebView
  webview_flutter: ^4.12.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7

  # Icons
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - .env
