name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create api_keys.dart for CI
        run: cp lib/core/constants/api_keys.dart.example lib/core/constants/api_keys.dart

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create api_keys.dart for CI
        run: cp lib/core/constants/api_keys.dart.example lib/core/constants/api_keys.dart

      - name: Build Web (CanvasKit)
        run: flutter build web --release --web-renderer=canvaskit

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
